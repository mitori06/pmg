// Remember a correct password on this device so repeat visits / in-page
// navigation (e.g. thanks page -> back to top) never re-prompt.
var STORE_KEY = "pmg_unlock_v1";

function b64ToBytes(b64){
  var bin = atob(b64); var len = bin.length; var u = new Uint8Array(len);
  for (var i=0;i<len;i++) u[i] = bin.charCodeAt(i);
  return u;
}

async function decrypt(password){
  var raw = b64ToBytes(CIPHER_B64);
  // openssl "Salted__" format: 8 magic + 8 salt + ciphertext
  var magic = String.fromCharCode.apply(null, raw.slice(0,8));
  if (magic !== "Salted__") throw new Error("format");
  var salt = raw.slice(8,16);
  var data = raw.slice(16);
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password),
      {name:"PBKDF2"}, false, ["deriveBits"]);
  var bits = await crypto.subtle.deriveBits(
      {name:"PBKDF2", salt:salt, iterations:ITER, hash:"SHA-256"}, keyMaterial, 48*8);
  var kb = new Uint8Array(bits);
  var key = kb.slice(0,32); var iv = kb.slice(32,48);
  var cryptoKey = await crypto.subtle.importKey("raw", key, {name:"AES-CBC"}, false, ["decrypt"]);
  var plain = await crypto.subtle.decrypt({name:"AES-CBC", iv:iv}, cryptoKey, data);
  return new TextDecoder("utf-8").decode(plain);
}

function render(html){
  // Render inside an iframe so the page loads exactly like the original
  // (proper script ordering, AOS, Tailwind all run on a real document load).
  var frame = document.getElementById("frame");
  frame.srcdoc = html;
  document.getElementById("center").style.display = "none";
  frame.style.display = "block";
  document.title = "PMG";
}

function showGate(){
  document.getElementById("center").style.display = "flex";
  var pw = document.getElementById("pw");
  if (pw) pw.focus();
}

function storeGet(){ try { return localStorage.getItem(STORE_KEY); } catch(e){ return null; } }
function storeSet(v){ try { localStorage.setItem(STORE_KEY, v); } catch(e){} }
function storeClear(){ try { localStorage.removeItem(STORE_KEY); } catch(e){} }

document.getElementById("f").addEventListener("submit", async function(e){
  e.preventDefault();
  var btn = document.getElementById("btn");
  var err = document.getElementById("err");
  var pw = document.getElementById("pw").value;
  err.textContent = ""; btn.disabled = true; btn.textContent = "確認中…";
  try {
    var html = await decrypt(pw);
    storeSet(pw);
    render(html);
  } catch (ex) {
    err.textContent = "パスワードが違います。";
    btn.disabled = false; btn.textContent = "表示する";
  }
});

// On load: silently unlock if this device already has a valid password,
// otherwise reveal the gate. The content is never shown before decryption.
(async function(){
  var saved = storeGet();
  if (saved) {
    try { render(await decrypt(saved)); return; }
    catch (ex) { storeClear(); }
  }
  showGate();
})();
</script>
